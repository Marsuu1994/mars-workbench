name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format:
    name: Prettier (Google style)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Skip lifecycle scripts: the postinstall `prisma generate` needs DB env
      # vars, and Prettier has no dependency on the generated client.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check formatting
        run: npm run format:check
