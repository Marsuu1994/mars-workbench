<!DOCTYPE html>
<html lang="en" data-mockup-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mars Workbench — Login</title>
<link rel="stylesheet" href="../mockup-theme.css" />
<style>
  /*
   * mars-dark theme tokens (mirrors globals.css)
   *
   * Implementation mapping:
   *   --base-300  → bg-base-300
   *   --base-100  → bg-base-100
   *   --base-content → text-base-content
   *   --primary   → text-primary, from-primary
   *   --secondary → text-secondary, to-secondary
   *   --neutral   → bg-neutral
   */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Outfit:wght@300;600;700&display=swap');

  /* Dark (default) */
  :root, [data-mockup-theme="dark"] {
    --base-100: #0d1321;
    --base-200: #070c18;
    --base-300: #030610;
    --base-content: #d9e8ea;
    --primary: #2ce0f1;
    --secondary: #b296ff;
    --accent: #fb9344;
    --neutral: #1c2435;
    --neutral-content: #d9e8ea;
    --glow-cyan: rgba(44, 224, 241, 0.06);
    --glow-purple: rgba(178, 150, 255, 0.04);
    --glow-rose: rgba(251, 147, 68, 0.03);
    --grid-line: rgba(217, 232, 234, 0.02);
    --divider: rgba(217, 232, 234, 0.08);
    --btn-border: rgba(217, 232, 234, 0.1);
    --btn-hover-border: rgba(44, 224, 241, 0.25);
    --tagline: rgba(217, 232, 234, 0.45);
    --footer: rgba(217, 232, 234, 0.25);
    --btn-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    --glow-c1: rgba(44, 224, 241, 0.15);
    --glow-c2: rgba(178, 150, 255, 0.08);
    --glow-c1-hi: rgba(44, 224, 241, 0.22);
    --glow-c2-hi: rgba(178, 150, 255, 0.12);
    --btn-sheen-1: rgba(44, 224, 241, 0.05);
    --btn-sheen-2: rgba(178, 150, 255, 0.05);
  }
  /* Light */
  [data-mockup-theme="light"] {
    --base-100: #f7efe3;
    --base-200: #efe5d5;
    --base-300: #e5d7c4;
    --base-content: #181f2f;
    --primary: #0e6f81;
    --secondary: #6e43bf;
    --accent: #ac5107;
    --neutral: #4a3221;
    --neutral-content: #f7efe3;
    --glow-cyan: rgba(14, 111, 129, 0.08);
    --glow-purple: rgba(110, 67, 191, 0.06);
    --glow-rose: rgba(172, 81, 7, 0.04);
    --grid-line: rgba(24, 31, 47, 0.03);
    --divider: rgba(24, 31, 47, 0.08);
    --btn-border: rgba(24, 31, 47, 0.12);
    --btn-hover-border: rgba(14, 111, 129, 0.4);
    --tagline: rgba(24, 31, 47, 0.45);
    --footer: rgba(24, 31, 47, 0.3);
    --btn-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    --glow-c1: rgba(14, 111, 129, 0.15);
    --glow-c2: rgba(110, 67, 191, 0.08);
    --glow-c1-hi: rgba(14, 111, 129, 0.22);
    --glow-c2-hi: rgba(110, 67, 191, 0.12);
    --btn-sheen-1: rgba(14, 111, 129, 0.05);
    --btn-sheen-2: rgba(110, 67, 191, 0.05);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--base-300);
    color: var(--base-content);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── atmospheric background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 100%, var(--glow-cyan) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 20%, var(--glow-purple) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 30%, var(--glow-rose) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── subtle grid ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid-line) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── card ── */
  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  /* ── brand ── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .brand-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 40px var(--glow-c1),
      0 0 80px var(--glow-c2);
    animation: glow 4s ease-in-out infinite alternate;
  }

  @keyframes glow {
    0%   { box-shadow: 0 0 40px var(--glow-c1), 0 0 80px var(--glow-c2); }
    100% { box-shadow: 0 0 50px var(--glow-c1-hi), 0 0 100px var(--glow-c2-hi); }
  }

  .brand-icon svg {
    width: 28px;
    height: 28px;
    stroke: white;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .brand-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.5px;
    color: var(--base-content);
  }

  .brand-name span {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: var(--tagline);
    letter-spacing: 0.3px;
  }

  /* ── divider ── */
  .divider-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      var(--divider) 30%,
      var(--divider) 70%,
      transparent 100%
    );
  }

  /* ── sign-in body ── */
  .login-body {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── google button ── */
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 24px;
    border: 1px solid var(--btn-border);
    border-radius: 12px;
    background: var(--neutral);
    color: var(--neutral-content);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .google-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--btn-sheen-1), var(--btn-sheen-2));
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .google-btn:hover {
    border-color: var(--btn-hover-border);
    transform: translateY(-1px);
    box-shadow: var(--btn-shadow);
  }

  .google-btn:hover::before { opacity: 1; }
  .google-btn:active { transform: translateY(0); }

  .google-btn svg,
  .google-btn span {
    position: relative;
    z-index: 1;
  }

  .google-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  /* ── footer ── */
  .login-footer {
    font-size: 12px;
    color: var(--footer);
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.2px;
  }

  /* ── fade-in animation ── */
  .login-card > * {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.6s ease forwards;
  }
  .login-card > *:nth-child(1) { animation-delay: 0.1s; }
  .login-card > *:nth-child(2) { animation-delay: 0.25s; }
  .login-card > *:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z" />
        <path d="M2 17l10 5 10-5" />
        <path d="M2 12l10 5 10-5" />
      </svg>
    </div>
    <div class="brand-name"><span>Mars</span> Workbench</div>
    <div class="brand-tagline">Plan. Focus. Ship.</div>
  </div>

  <div class="login-body">
    <div class="divider-line"></div>
    <button class="google-btn" onclick="alert('Redirect to Google OAuth')">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Sign in with Google</span>
    </button>
  </div>

  <div class="login-footer">
    By signing in you agree to our terms of use.
  </div>
</div>

<script>
(function() {
  var btn = document.createElement('button');
  btn.className = 'mockup-theme-toggle';
  btn.title = 'Toggle theme';
  var sun = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
  var moon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>';
  function update() {
    var t = document.documentElement.getAttribute('data-mockup-theme');
    btn.innerHTML = t === 'dark' ? sun : moon;
  }
  btn.addEventListener('click', function() {
    var t = document.documentElement.getAttribute('data-mockup-theme');
    document.documentElement.setAttribute('data-mockup-theme', t === 'dark' ? 'light' : 'dark');
    update();
  });
  document.body.appendChild(btn);
  update();
})();
</script>
</body>
</html>
